<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARG Pipeline Explorer — The Elusive Resistome</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js" charset="utf-8"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg:#f7f8f7; --panel:#ffffff; --panel-2:#eef0ee; --line:#dde2de;
    --ink:#1a2b28; --ink-dim:#5c6b66;
    --teal:#1d3557; --amber:#2a9d8f; --coral:#e76f51;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;}
  ::selection{background:var(--teal);color:#ffffff;}

  #app{display:flex;align-items:stretch;min-height:100vh;}
  #sidebar{
    flex:0 0 250px;width:250px;border-right:1px solid var(--line);background:var(--panel);
    padding:22px 14px;position:sticky;top:0;align-self:flex-start;height:100vh;overflow-y:auto;
  }
  #app.sidebar-hidden #sidebar{display:none;}
  #sidebar .nav-brand{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    font-family:'Fraunces',serif;font-size:15.5px;padding:2px 4px 18px 10px;line-height:1.35;
  }
  .sidebar-toggle-btn{
    flex:0 0 auto;width:26px;height:26px;border-radius:5px;border:1px solid var(--line);background:var(--bg);
    color:var(--ink-dim);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;
  }
  .sidebar-toggle-btn:hover{color:var(--ink);}
  #sidebar-show-btn{
    display:none;position:fixed;top:16px;left:16px;z-index:40;
    width:34px;height:34px;border-radius:7px;border:1px solid var(--line);background:var(--panel);
    color:var(--ink-dim);cursor:pointer;font-size:15px;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  #app.sidebar-hidden ~ #sidebar-show-btn{display:flex;}
  .nav-group-title{
    display:flex;align-items:center;justify-content:space-between;gap:6px;
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.03em;text-transform:uppercase;
    color:var(--ink-dim);padding:9px 10px;border-radius:5px;cursor:pointer;user-select:none;
  }
  .nav-group-title:hover{background:var(--panel-2);color:var(--ink);}
  .nav-group-title.active{color:var(--teal);}
  .nav-caret{font-size:9px;transition:transform .15s;}
  .nav-group.open .nav-caret{transform:rotate(90deg);}
  .nav-children{display:none;padding:2px 0 6px 8px;border-left:1px solid var(--line);margin-left:12px;}
  .nav-group.open .nav-children{display:block;}
  .nav-item{
    display:block;width:100%;text-align:left;background:none;border:none;cursor:pointer;
    font-family:'Inter',sans-serif;font-size:13px;color:var(--ink-dim);padding:8px 10px;border-radius:5px;
  }
  .nav-item:hover{background:var(--panel-2);color:var(--ink);}
  .nav-item.active{background:var(--teal);color:#ffffff;font-weight:600;}
  .nav-habitat-picker{display:none;padding:2px 10px 8px;}
  .nav-group.open .nav-habitat-picker{display:block;}
  .nav-habitat-picker select{width:100%;font-size:12px;padding:6px 7px;}
  #content{flex:1;min-width:0;overflow-x:hidden;}
  #content-inner{max-width:1080px;margin:0 auto;padding:44px 28px;}
  @media (max-width:880px){
    #app{flex-direction:column;}
    #sidebar{position:static;width:100%;height:auto;flex:none;border-right:none;border-bottom:1px solid var(--line);}
  }

  .flow-section{padding:0;}
  .flow-back{
    display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;
    font-size:13px;font-weight:700;color:var(--amber);background:var(--panel);
    border:1px solid var(--line);border-radius:6px;cursor:pointer;padding:8px 14px;margin-bottom:10px;
  }
  .flow-back:hover{background:var(--panel-2);border-color:var(--amber);}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;align-items:stretch;}
  .intro-layout{display:grid;grid-template-columns:1fr 280px;gap:22px;align-items:stretch;margin-top:22px;}
  @media (max-width:820px){.intro-layout{grid-template-columns:1fr;}}
  .intro-main{display:flex;flex-direction:column;}
  .intro-main .card{flex:1;margin-bottom:0;display:flex;flex-direction:column;}
  .intro-sidebar{display:flex;}
  .intro-sidebar .card{margin-bottom:0;flex:1;display:flex;flex-direction:column;}
  .intro-sidebar .plotwrap{flex:1;}

  h2{font-family:'Fraunces',serif;font-size:21px;margin:0 0 4px;}
  .sub{color:var(--ink-dim);font-size:13px;line-height:1.5;max-width:680px;margin:0 0 14px;}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:20px 22px;margin-bottom:20px;}
  .card h3{font-family:'Fraunces',serif;font-size:16.5px;margin:0 0 4px;}
  .card .desc{font-size:13px;color:var(--ink-dim);line-height:1.55;margin:0 0 14px;max-width:640px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media (max-width:640px){.grid2{grid-template-columns:1fr;}}

  /* controls */
  .controls-toggle{
    display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;
    font-size:13px;letter-spacing:.02em;font-weight:700;color:var(--coral);background:var(--panel);
    border:1px solid var(--line);border-radius:6px;cursor:pointer;padding:8px 14px;margin-bottom:10px;
  }
  .controls-toggle:hover{background:var(--panel-2);border-color:var(--coral);}
  .controls-toggle-arrow{font-size:9px;transition:transform .15s;}
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;margin-bottom:14px;
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;}
  .controls.controls-collapsed{display:none;}
  .control{display:flex;flex-direction:column;gap:4px;min-width:150px;}
  .control label{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--ink-dim);}
  select, .msbox{
    background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:4px;
    font-family:'Inter',sans-serif;font-size:12.5px;padding:6px 8px;
  }
  select[multiple]{min-height:96px;}
  .checklist{
    max-height:220px;overflow-y:auto;border:1px solid var(--line);border-radius:4px;
    padding:6px 10px;background:var(--bg);
  }
  .check-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12.5px;cursor:pointer;color:var(--ink);}
  .check-row input{accent-color:var(--teal);cursor:pointer;flex:0 0 auto;}
  .check-row span{flex:1;}
  .chips{display:flex;flex-wrap:wrap;gap:5px;max-width:280px;}
  .chip{
    font-size:11px;font-family:'JetBrains Mono',monospace;padding:4px 8px;border-radius:12px;
    background:var(--bg);border:1px solid var(--line);color:var(--ink-dim);cursor:pointer;user-select:none;
  }
  .chip.on{color:#ffffff;background:var(--teal);border-color:var(--teal);font-weight:700;}
  input[type=range]{accent-color:var(--teal);}
  .toggle-btn{
    font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--bg);color:var(--ink-dim);
    border:1px solid var(--line);border-radius:4px;padding:6px 12px;cursor:pointer;
  }
  .toggle-btn.on{background:var(--teal);color:#ffffff;border-color:var(--teal);font-weight:700;}

  .plotwrap{width:100%;}
  .tsv-dl{
    font-family:'JetBrains Mono',monospace;font-size:11.5px;
    background:var(--panel-2);color:var(--ink-dim);border:1px solid var(--line);
    border-radius:4px;padding:4px 10px;cursor:pointer;margin:8px 0 2px;
  }
  .tsv-dl:hover{color:var(--ink);border-color:var(--ink-dim);}
  .loading{color:var(--ink-dim);font-size:13px;font-family:'JetBrains Mono',monospace;padding:40px;text-align:center;}

  /* ---- FAQ accordion ---- */
  .faq-block{margin-top:32px;}
  .faq-block .faq-title{font-family:'Fraunces',serif;font-size:17px;margin:0 0 10px;}
  .faq-item{border-top:1px solid var(--line);}
  .faq-item:last-child{border-bottom:1px solid var(--line);}
  .faq-question{
    display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;
    cursor:pointer;padding:12px 4px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ink);
  }
  .faq-question:hover{color:var(--teal);}
  .faq-arrow{flex:0 0 auto;font-size:11px;color:var(--ink-dim);transition:transform .15s;}
  .faq-answer{display:none;padding:0 4px 16px 24px;font-size:13.5px;line-height:1.6;color:var(--ink-dim);}
  .faq-answer ul{margin:0;padding-left:18px;}
  .faq-answer li{margin-bottom:8px;}
  .faq-answer li:last-child{margin-bottom:0;}
  .faq-item.open .faq-answer{display:block;}

  table.datatable{width:100%;border-collapse:collapse;font-size:13px;}
  table.datatable th, table.datatable td{padding:7px 10px;border-bottom:1px solid var(--line);text-align:left;}
  table.datatable th{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.03em;}
  table.datatable tr:hover td{background:var(--panel-2);}
  .table-toolbar{display:flex;gap:12px;align-items:center;margin-bottom:12px;}
  .table-toolbar input[type=text]{
    background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:4px;padding:7px 10px;
    font-size:13px;flex:1;max-width:280px;
  }
  .pager{display:flex;gap:8px;align-items:center;margin-top:10px;font-size:12.5px;color:var(--ink-dim);}
  .pager button{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:4px;
    padding:4px 10px;cursor:pointer;font-family:'JetBrains Mono',monospace;}
  .pager button:disabled{opacity:.35;cursor:default;}

  a{color:var(--teal);}
  .stat-row{display:flex;gap:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin:22px 0;}
  .stat{flex:1;padding:16px 18px;border-right:1px solid var(--line);}
  .stat:last-child{border-right:none;}
  .stat .n{font-family:'Fraunces',serif;font-size:28px;color:var(--coral);}
  .stat .n.teal{color:var(--teal);} .stat .n.amber{color:var(--amber);}
  .stat .l{font-size:11.5px;color:var(--ink-dim);margin-top:6px;line-height:1.4;}
  .footnote{font-size:11.5px;color:var(--ink-dim);margin-top:10px;line-height:1.5;}
  ul.plain{padding-left:18px;font-size:14px;line-height:1.7;color:#33403c;}
  .pipeline-group-label{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.04em;text-transform:uppercase;
    color:var(--ink-dim);font-weight:700;margin:12px 0 2px;
  }
  .pipeline-group-label:first-of-type{margin-top:0;}

  /* ---- guided flow controls ---- */
  .wizard-actions{display:flex;justify-content:flex-end;margin-top:28px;gap:12px;}
  .btn-primary{
    font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.02em;
    background:var(--teal);color:#ffffff;border:none;border-radius:6px;padding:12px 22px;cursor:pointer;
  }
  .btn-primary:hover{opacity:.9;}
  .btn-primary:disabled{opacity:.65;cursor:not-allowed;}
  .spinner{
    display:inline-block;width:13px;height:13px;margin-right:8px;vertical-align:-2px;
    border:2px solid rgba(255,255,255,.4);border-top-color:#ffffff;border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .btn-secondary{
    font-family:'JetBrains Mono',monospace;font-size:13px;background:none;color:var(--ink-dim);
    border:1px solid var(--line);border-radius:6px;padding:12px 22px;cursor:pointer;
  }
  .btn-secondary:hover{color:var(--ink);}
  .choice-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:26px 0;}
  @media (max-width:640px){.choice-cards{grid-template-columns:1fr;}}
  .choice-card{
    background:var(--panel);border:2px solid var(--line);border-radius:10px;padding:22px;
    cursor:pointer;text-align:left;
  }
  .choice-card:hover{border-color:var(--ink-dim);}
  .choice-card.selected{border-color:var(--teal);background:var(--panel-2);}
  .choice-card h3{font-family:'Fraunces',serif;font-size:18px;margin:0 0 8px;color:var(--ink);}
  .choice-card p{font-size:13px;color:var(--ink-dim);line-height:1.55;margin:0;}
  .habitat-picker{margin-top:4px;}
  .habitat-picker select{width:100%;padding:10px;font-size:13.5px;}

</style>
</head>
<body>
<div id="app">
  <nav id="sidebar"></nav>
  <main id="content"><div id="content-inner">
    <section class="flow-section" id="sec-intro">
      <p class="loading">Loading dataset…</p>
    </section>
  </div></main>
</div>
<button id="sidebar-show-btn" type="button" title="Show menu">☰</button>

<script>
const DATA_FILES = [
  "tool_meta","arg_counts","gene_class_proportion","gene_class_order",
  "jaccard","jaccard_full","identity_distribution","identity_by_class",
  "abundance_summary","richness_summary","habitat_n_samples","abundance_jitter_sample",
  "abundance_class_summary","csc","table_s1_samples",
  "habitat_arg_counts","habitat_gene_class_proportion","habitat_jaccard_full",
  "habitat_identity_distribution","habitat_identity_by_class","habitat_csc"
];

const DB_COLOR = {" ":"#1B9E77","  ":"#D95F02","   ":"#7570B3","    ":"#E7298A",
                  "CARD":"#E6AB02","NCBI":"#66A61E","ResFinder":"#666666"};

let DATA = {};
let CHOSEN_HABITAT = null;

function fromColumnar(obj){
  const {columns, data} = obj;
  return data.map(row => Object.fromEntries(columns.map((c,i)=>[c,row[i]])));
}

async function loadAll(){
  const entries = await Promise.all(DATA_FILES.map(async name=>{
    const res = await fetch(`data/${name}.json`);
    const json = await res.json();
    return [name, Array.isArray(json) ? json : (json.columns ? fromColumnar(json) : json)];
  }));
  entries.forEach(([k,v])=>DATA[k]=v);
}

function uniq(arr, key){ return [...new Set(arr.map(d=>key?d[key]:d))]; }

function getOrCreateSection(id){
  let el = document.getElementById(id);
  if(!el){
    el = document.createElement('section');
    el.className = 'flow-section';
    el.id = id;
    document.getElementById('flow').appendChild(el);
  }
  return el;
}

function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth', block:'start'});
}

loadAll().then(()=>{
  buildToolLookups();
  initApp();
}).catch(err=>{
  document.getElementById('content-inner').innerHTML = '<p class="loading">Failed to load data: '+err.message+'</p>';
});
</script>
<script src="tabs.js"></script>
</body>
</html>
